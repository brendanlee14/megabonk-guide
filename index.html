<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Megabonk Build Guide</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0d1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a14; --surface: #12121f; --surface2: #1a1a2e; --border: #2a2a45;
      --accent: #ff4d6d; --accent2: #ffd700; --accent3: #00d4ff;
      --text: #e8e8f5; --muted: #7070a0;
      --s: #ff4d6d; --a: #ff8c42; --b: #ffd700; --c: #7ecb35;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Exo 2',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
    body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(255,77,109,.07) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(0,212,255,.06) 0%,transparent 60%); pointer-events:none; z-index:0; }
    header { position:sticky; top:0; z-index:100; background:rgba(10,10,20,.92); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; gap:12px; }
    .logo { font-family:'Russo One',sans-serif; font-size:1.3rem; color:var(--accent); letter-spacing:1px; text-shadow:0 0 20px rgba(255,77,109,.5); }
    .logo span { color:var(--accent2); }
    .subtitle { font-size:.7rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-left:auto; }
    .app { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:24px 16px; }
    #char-select { display:block; } #build-screen { display:none; }
    .screen-title { font-family:'Russo One',sans-serif; font-size:1.6rem; margin-bottom:6px; }
    .screen-title span { color:var(--accent); }
    .screen-desc { color:var(--muted); font-size:.85rem; margin-bottom:14px; }
    .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
    .filter-btn { font-family:'Exo 2',sans-serif; font-size:.7rem; font-weight:600; letter-spacing:1px; padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; transition:all .15s; }
    .filter-btn:hover { color:var(--text); border-color:var(--muted); }
    .filter-btn.active-all { background:rgba(0,212,255,.1); border-color:var(--accent3); color:var(--accent3); }
    .filter-btn.active-S { background:rgba(255,77,109,.15); border-color:var(--s); color:var(--s); }
    .filter-btn.active-A { background:rgba(255,140,66,.15); border-color:var(--a); color:var(--a); }
    .filter-btn.active-B { background:rgba(255,215,0,.1); border-color:var(--b); color:var(--b); }
    .filter-btn.active-C { background:rgba(126,203,53,.1); border-color:var(--c); color:var(--c); }
    .char-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; }
    .char-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 10px 12px; cursor:pointer; transition:all .2s; text-align:center; position:relative; overflow:hidden; }
    .char-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.03)); pointer-events:none; }
    .char-card:hover { border-color:var(--accent); transform:translateY(-3px); box-shadow:0 8px 30px rgba(255,77,109,.2); }
    .char-card.hidden { display:none; }
    .char-emoji { font-size:2.2rem; margin-bottom:6px; display:block; }
    .char-name { font-family:'Russo One',sans-serif; font-size:.75rem; letter-spacing:.5px; }
    .char-starter { font-size:.62rem; color:var(--muted); margin-top:3px; line-height:1.3; }
    .char-tier-badge { position:absolute; top:7px; right:7px; font-family:'Russo One',sans-serif; font-size:.6rem; padding:2px 5px; border-radius:4px; }
    .tier-S { background:rgba(255,77,109,.2); color:var(--s); border:1px solid rgba(255,77,109,.4); }
    .tier-A { background:rgba(255,140,66,.2); color:var(--a); border:1px solid rgba(255,140,66,.4); }
    .tier-B { background:rgba(255,215,0,.15); color:var(--b); border:1px solid rgba(255,215,0,.3); }
    .tier-C { background:rgba(126,203,53,.12); color:var(--c); border:1px solid rgba(126,203,53,.3); }
    .back-btn { display:inline-flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); color:var(--muted); padding:8px 16px; border-radius:8px; cursor:pointer; font-family:'Exo 2',sans-serif; font-size:.8rem; margin-bottom:20px; transition:all .2s; }
    .back-btn:hover { color:var(--text); border-color:var(--muted); }
    .char-hero { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:18px; display:flex; align-items:center; gap:18px; position:relative; overflow:hidden; }
    .char-hero::after { content:''; position:absolute; right:-20px; top:-20px; width:150px; height:150px; background:radial-gradient(circle,rgba(255,77,109,.1) 0%,transparent 70%); pointer-events:none; }
    .char-hero-emoji { font-size:3.5rem; flex-shrink:0; }
    .char-hero-info h2 { font-family:'Russo One',sans-serif; font-size:1.5rem; color:var(--accent); }
    .char-hero-passive { font-size:.76rem; color:var(--muted); margin-top:5px; line-height:1.5; }
    .starter-badge { display:inline-flex; align-items:center; background:rgba(255,215,0,.1); border:1px solid rgba(255,215,0,.3); border-radius:6px; padding:3px 9px; font-size:.7rem; color:var(--accent2); margin-top:8px; }
    .playstyle-tag { display:inline-block; background:rgba(0,212,255,.1); border:1px solid rgba(0,212,255,.3); border-radius:6px; padding:3px 9px; font-size:.7rem; color:var(--accent3); margin-top:4px; margin-left:5px; }
    .section { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:13px; }
    .section-title { font-family:'Russo One',sans-serif; font-size:.82rem; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; display:flex; align-items:center; gap:7px; }
    .item-list { display:flex; flex-direction:column; gap:8px; }
    .item-row { display:flex; align-items:center; gap:10px; background:var(--surface2); border-radius:10px; padding:9px 12px; border:1px solid transparent; transition:border-color .15s; }
    .item-row:hover { border-color:var(--border); }
    .rank-badge { font-family:'Russo One',sans-serif; font-size:.92rem; min-width:26px; text-align:center; }
    .rank-S { color:var(--s); text-shadow:0 0 10px rgba(255,77,109,.6); }
    .rank-A { color:var(--a); text-shadow:0 0 8px rgba(255,140,66,.5); }
    .rank-B { color:var(--b); text-shadow:0 0 8px rgba(255,215,0,.4); }
    .rank-C { color:var(--c); }
    .item-emoji { font-size:1.2rem; min-width:26px; text-align:center; }
    .item-info { flex:1; }
    .item-name { font-weight:600; font-size:.87rem; }
    .item-desc { font-size:.7rem; color:var(--muted); margin-top:2px; line-height:1.4; }
    .item-tags { display:flex; flex-wrap:wrap; gap:3px; margin-top:3px; }
    .tag { font-size:.59rem; padding:2px 5px; border-radius:4px; letter-spacing:.4px; }
    .tag-dmg { background:rgba(255,77,109,.15); color:#ff8099; }
    .tag-util { background:rgba(0,212,255,.12); color:#80e8ff; }
    .tag-def { background:rgba(126,203,53,.15); color:#a8e87c; }
    .tag-luck { background:rgba(255,215,0,.15); color:#ffe066; }
    .tag-speed { background:rgba(180,100,255,.15); color:#d0a0ff; }
    .tag-aoe { background:rgba(255,140,66,.15); color:#ffb380; }
    .tips-box { background:rgba(255,215,0,.04); border:1px solid rgba(255,215,0,.18); }
    .tips-title { font-size:.68rem; letter-spacing:1px; text-transform:uppercase; color:var(--accent2); margin-bottom:8px; font-weight:700; }
    .tips-list { list-style:none; }
    .tips-list li { font-size:.75rem; color:var(--muted); padding:2px 0 2px 14px; position:relative; line-height:1.5; }
    .tips-list li::before { content:'▸'; position:absolute; left:0; color:var(--accent2); }
    .legend { display:flex; gap:12px; flex-wrap:wrap; margin-top:16px; padding:10px 14px; background:var(--surface); border-radius:10px; border:1px solid var(--border); }
    .legend-item { display:flex; align-items:center; gap:5px; font-size:.7rem; color:var(--muted); }
    .legend-rank { font-family:'Russo One',sans-serif; font-size:.85rem; }
    /* --- BUILD TABS --- */
    .build-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    .build-tab { font-family:'Exo 2',sans-serif; font-size:.72rem; font-weight:700; padding:7px 16px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; transition:all .2s; letter-spacing:.5px; }
    .build-tab:hover { color:var(--text); border-color:var(--muted); }
    .build-tab.active { background:rgba(0,212,255,.12); border-color:var(--accent3); color:var(--accent3); box-shadow:0 0 12px rgba(0,212,255,.15); }
    .build-tab-label { font-size:.58rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; margin-top:2px; }
    /* --- PROGRESSION GUIDE --- */
    .prog-section { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:13px; }
    .prog-phases { display:flex; flex-direction:column; gap:10px; }
    .phase-block { border-radius:10px; overflow:hidden; border:1px solid transparent; }
    .phase-block.phase-1 { border-color:rgba(126,203,53,.25); }
    .phase-block.phase-2 { border-color:rgba(255,215,0,.25); }
    .phase-block.phase-3 { border-color:rgba(255,140,66,.25); }
    .phase-block.phase-4 { border-color:rgba(255,77,109,.3); }
    .phase-header { display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; user-select:none; }
    .phase-block.phase-1 .phase-header { background:rgba(126,203,53,.08); }
    .phase-block.phase-2 .phase-header { background:rgba(255,215,0,.07); }
    .phase-block.phase-3 .phase-header { background:rgba(255,140,66,.08); }
    .phase-block.phase-4 .phase-header { background:rgba(255,77,109,.09); }
    .phase-label { font-family:'Russo One',sans-serif; font-size:.78rem; letter-spacing:.5px; }
    .phase-block.phase-1 .phase-label { color:var(--c); }
    .phase-block.phase-2 .phase-label { color:var(--b); }
    .phase-block.phase-3 .phase-label { color:var(--a); }
    .phase-block.phase-4 .phase-label { color:var(--s); }
    .phase-sublabel { font-size:.67rem; color:var(--muted); margin-left:auto; }
    .phase-chevron { font-size:.7rem; color:var(--muted); transition:transform .2s; margin-left:4px; }
    .phase-block.open .phase-chevron { transform:rotate(90deg); }
    .phase-body { display:none; padding:12px 14px 14px; background:var(--surface2); }
    .phase-block.open .phase-body { display:block; }
    .phase-row { margin-bottom:10px; }
    .phase-row:last-child { margin-bottom:0; }
    .phase-row-title { font-size:.65rem; letter-spacing:1px; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:5px; }
    .phase-chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:4px; }
    .phase-chip { font-size:.7rem; padding:3px 9px; border-radius:12px; font-weight:600; }
    .chip-weapon { background:rgba(255,77,109,.12); color:#ff8099; border:1px solid rgba(255,77,109,.25); }
    .chip-tome { background:rgba(0,212,255,.1); color:#80e8ff; border:1px solid rgba(0,212,255,.2); }
    .phase-tip { font-size:.72rem; color:var(--muted); line-height:1.5; padding-left:12px; position:relative; margin-top:3px; }
    .phase-tip::before { content:'▸'; position:absolute; left:0; color:var(--accent3); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .animate-in { animation:fadeIn .22s ease-out forwards; }
    @media(max-width:480px){
      .char-grid{grid-template-columns:repeat(3,1fr);}
      .char-hero{flex-direction:column;text-align:center;}
      .char-hero-emoji{font-size:2.8rem;}
    }
  </style>
</head>
<body>
<header>
  <div class="logo">MEGA<span>BONK</span></div>
  <div class="subtitle">Build Guide</div>
</header>
<div class="app">
  <div id="char-select">
    <h1 class="screen-title">Choose Your <span>Character</span></h1>
    <p class="screen-desc">All 21 characters — top weapons, tomes & items ranked S through C</p>
    <div class="filter-bar">
      <button class="filter-btn active-all" onclick="filterTier('all',this)">ALL 21</button>
      <button class="filter-btn" onclick="filterTier('S',this)">⭐ S-Tier</button>
      <button class="filter-btn" onclick="filterTier('A',this)">🔥 A-Tier</button>
      <button class="filter-btn" onclick="filterTier('B',this)">💛 B-Tier</button>
      <button class="filter-btn" onclick="filterTier('C',this)">🟢 C-Tier</button>
    </div>
    <div class="char-grid" id="char-grid"></div>
    <div class="legend">
      <div class="legend-item"><span class="legend-rank rank-S">S</span> Must-have / Game-breaking</div>
      <div class="legend-item"><span class="legend-rank rank-A">A</span> Excellent pick</div>
      <div class="legend-item"><span class="legend-rank rank-B">B</span> Strong option</div>
      <div class="legend-item"><span class="legend-rank rank-C">C</span> Situational</div>
    </div>
  </div>
  <div id="build-screen">
    <button class="back-btn" onclick="goBack()">← All Characters</button>
    <div id="build-content"></div>
  </div>
</div>
<script>
const C=[
  {id:'dicehead',name:'Dicehead',emoji:'🎲',tier:'S',starter:'🎲 Dice',passive:'Gamba: Gains a random permanent buff every level. Rolling 6 permanently increases Crit Chance.',playstyle:'RNG Crit Snowball',
   weapons:[
    {rank:'S',emoji:'🎲',name:'Dice',desc:'Starter — rolls 1-6 damage. Rolling 6 permanently boosts Crit Chance. Core identity weapon.',tags:['dmg']},
    {rank:'S',emoji:'🔫',name:'Revolver',desc:'Multi-hit ranged weapon — generates more crit opportunities per second.',tags:['dmg']},
    {rank:'A',emoji:'⚔️',name:'Katana',desc:'High-speed melee that stacks crit damage as Crit Chance climbs.',tags:['dmg','aoe']},
    {rank:'A',emoji:'🏹',name:'Bow',desc:'Piercing shots = more crit procs per arrow. Excellent mid-range coverage.',tags:['dmg']},
    {rank:'B',emoji:'💀',name:'Dexecutioner',desc:'Highest DPS weapon — even better once Crit Chance is stacked high.',tags:['dmg']},
   ],
   tomes:[
    {rank:'S',emoji:'📚',name:'XP Tome',desc:'More levels = more dice rolls = more permanent buffs. The engine of the build.',tags:['util']},
    {rank:'S',emoji:'🍀',name:'Luck Tome',desc:'Higher luck = more frequent 6 rolls = permanent Crit Chance stacking. Critical priority.',tags:['luck']},
    {rank:'A',emoji:'🎯',name:'Precision Tome',desc:'Increases Crit Damage multiplier — as crits stack to 50%+, this becomes insane.',tags:['dmg']},
    {rank:'A',emoji:'⚔️',name:'Damage Tome',desc:'Flat multiplier that amplifies every crit hit exponentially.',tags:['dmg']},
    {rank:'B',emoji:'⏱️',name:'Cooldown Tome',desc:'More weapon procs = more crit opportunities per second.',tags:['dmg','util']},
   ],
   items:[
    {rank:'S',emoji:'🍴',name:'Giant Fork',desc:'CRITICAL ITEM — converts regular crits into Megacrits (x20 damage). Build-defining without exception.',tags:['dmg']},
    {rank:'S',emoji:'🧃',name:'Forbidden Juice',desc:'Massive Crit Damage scaling — multiplies exponentially with stacked Crit Chance.',tags:['dmg']},
    {rank:'A',emoji:'💉',name:'Gym Sauce',desc:'Flat damage boost that amplifies every crit with the Precision multiplier.',tags:['dmg']},
    {rank:'A',emoji:'⚔️',name:'Demonic Blade',desc:'Heals on crits — essential sustain since you\'re critting constantly.',tags:['dmg','def']},
    {rank:'A',emoji:'🗡️',name:"Joe's Dagger",desc:'Attack speed boost — more procs means more dice rolls and crit opportunities.',tags:['dmg','util']},
   ],
   tips:['Early game is weak — survive to minute 15 and you become unstoppable.','Giant Fork transforms the build: without it, Dicehead is B-tier at best.','Never take bad items hoping for better RNG — survive to stack passive rolls.','Luck Tome + Clover = more 6s = permanent Crit Chance snowball.']},

  {id:'bandit',name:'Bandit',emoji:'🤠',tier:'S',starter:'💀 Dexecutioner',passive:'+1% Attack Speed per level',playstyle:'Attack Speed / Execute DPS',
   weapons:[
    {rank:'S',emoji:'💀',name:'Dexecutioner',desc:'Starter and best DPS weapon in Megabonk. Execute mechanic one-shots any target.',tags:['dmg']},
    {rank:'A',emoji:'✨',name:'Aura',desc:'360° passive damage ring — handles melee range while Dexecutioner handles everything else.',tags:['dmg','aoe']},
    {rank:'A',emoji:'🔫',name:'Revolver',desc:'Long-range precision for elites and bosses. Benefits from attack speed passive.',tags:['dmg']},
    {rank:'A',emoji:'🔥',name:'Flamewalker',desc:'Passive fire trail DoT — stacks constant damage as you move between targets.',tags:['dmg','aoe']},
    {rank:'B',emoji:'⚔️',name:'Katana',desc:'High-speed melee that synergizes with attack speed stacking.',tags:['dmg','aoe']},
   ],
   tomes:[
    {rank:'S',emoji:'📚',name:'XP Tome',desc:'Levels you faster so the attack speed passive stacks up earlier in runs.',tags:['util']},
    {rank:'A',emoji:'⏱️',name:'Cooldown Tome',desc:'Stacks with attack speed passive for incredibly fast Dexecutioner procs.',tags:['dmg','util']},
    {rank:'A',emoji:'🔢',name:'Quantity Tome',desc:'More projectiles = more Dexecutioner hits per proc.',tags:['dmg']},
    {rank:'A',emoji:'📐',name:'Size Tome',desc:'Increases Dexecutioner and Aura range — more ground covered per attack.',tags:['dmg','aoe']},
    {rank:'B',emoji:'⚔️',name:'Damage Tome',desc:'Raw damage multiplier to amplify Dexecutioner\'s already-devastating output.',tags:['dmg']},
   ],
   items:[
    {rank:'S',emoji:'🗡️',name:"Joe's Dagger",desc:'Attack Speed boost — directly amplifies Bandit\'s passive and Dexecutioner procs.',tags:['dmg','util']},
    {rank:'A',emoji:'🔋',name:'Battery',desc:'Reduces cooldowns — allows even more frequent weapon procs.',tags:['util']},
    {rank:'A',emoji:'⌚',name:'Time Bracelet',desc:'More attack speed on top of the passive and Joe\'s Dagger.',tags:['dmg','util']},
    {rank:'A',emoji:'💉',name:'Gym Sauce',desc:'Flat damage that makes each Dexecutioner execute hit harder.',tags:['dmg']},
    {rank:'B',emoji:'🧀',name:'Moldy Cheese',desc:'Passive DoT that stacks between Dexecutioner procs.',tags:['dmg','aoe']},
   ],
   tips:['Dexecutioner is S-tier by itself — Bandit makes it even stronger.','Joe\'s Dagger + Time Bracelet + Cooldown Tome = absurd attack speed.','Aura handles close-range while Dexecutioner executes mid-range targets.','Bandit and Sir Chadwell are the best characters in the current meta.']},

  {id:'robinette',name:'Robinette',emoji:'🏹',tier:'S',starter:'🏹 Bow',passive:'Stonks: +1% Gold Gain per level; +10% Damage per 1,000 gold held',playstyle:'Gold / Projectile Scaling',
   weapons:[
    {rank:'S',emoji:'🏹',name:'Bow',desc:'Starter — piercing, high-crit potential. Scales massively with Quantity Tome.',tags:['dmg']},
    {rank:'A',emoji:'🔫',name:'Revolver',desc:'High-damage companion that shares the same projectile stacking benefits.',tags:['dmg']},
    {rank:'A',emoji:'🎯',name:'Sniper Rifle',desc:'Highest base damage (22) in the game. Manual aim shreds bosses.',tags:['dmg']},
    {rank:'A',emoji:'💀',name:'Dexecutioner',desc:'Excellent secondary execute weapon once gold scaling ramps up.',tags:['dmg']},
    {rank:'B',emoji:'⚡',name:'Lightning Staff',desc:'Chain damage for horde clear while you kite at range.',tags:['dmg','aoe']},
   ],
   tomes:[
    {rank:'S',emoji:'🔢',name:'Quantity Tome',desc:'More arrows = more projectiles = multiplicative DPS from multishot passive.',tags:['dmg']},
    {rank:'A',emoji:'⚔️',name:'Damage Tome',desc:'Amplifies all projectile damage even further.',tags:['dmg']},
    {rank:'A',emoji:'⏱️',name:'Cooldown Tome',desc:'Shoot faster, generating more gold and hitting more enemies.',tags:['dmg','util']},
    {rank:'A',emoji:'🎯',name:'Precision Tome',desc:'Crit scaling on Bow — piercing shots proc crits across multiple enemies.',tags:['dmg']},
    {rank:'B',emoji:'📚',name:'XP Tome',desc:'Level faster to stack gold gain passive sooner.',tags:['util']},
   ],
   items:[
    {rank:'S',emoji:'💰',name:'Piggy Bank',desc:'Passive gold generation — more gold = more damage from Stonks passive.',tags:['luck','dmg']},
    {rank:'S',emoji:'💳',name:'Credit Card (Green)',desc:'Gold and Luck boost — synergizes directly with the Stonks passive.',tags:['luck','dmg']},
    {rank:'A',emoji:'🪙',name:'Lucky Coin',desc:'Gold bonus on hit — every arrow proc generates more gold and more damage.',tags:['luck','dmg']},
    {rank:'A',emoji:'💉',name:'Gym Sauce',desc:'Flat damage increase that stacks with the gold-based passive bonus.',tags:['dmg']},
    {rank:'B',emoji:'👁️',name:'Tactical Glasses',desc:'Elite damage bonus — great for boss fights where gold is already stacked.',tags:['dmg']},
   ],
   tips:['DO NOT spend gold on mediocre items — your gold IS your damage source.','1,000 gold held = +10% damage. At 20k gold you have +200% bonus damage.','Greed Shrines are excellent — spending HP for gold is a net positive.','8 of the top 10 world records use Robinette — she\'s that strong.']},

  {id:'vlad',name:'Vlad',emoji:'🧛',tier:'S',starter:'🩸 Blood Magic',passive:'Lifesteal scales with level — heals increasing % of all damage dealt',playstyle:'Lifesteal / Sustain Tank',

// Build grid
const grid=document.getElementById('char-grid');
C.forEach(char=>{
  const card=document.createElement('div');
  card.className='char-card';
  card.dataset.tier=char.tier;
  card.innerHTML=`<span class="char-tier-badge tier-${char.tier}">${char.tier}</span><span class="char-emoji">${char.emoji}</span><div class="char-name">${char.name}</div><div class="char-starter">${char.starter}</div>`;
  card.addEventListener('click',()=>showBuild(char.id));
  grid.appendChild(card);
});

function filterTier(tier,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.className='filter-btn');
  btn.className=`filter-btn active-${tier}`;
  document.querySelectorAll('.char-card').forEach(card=>{card.classList.toggle('hidden',tier!=='all'&&card.dataset.tier!==tier);});
}

      {rank:'A',emoji:'🧃',name:'Idle Juice',desc:'Damage boost for standing still — this build literally stands still. Free double damage.',tags:['dmg']},
      {rank:'B',emoji:'💉',name:'Gym Sauce',desc:'Flat damage boost to Aura and Lightning Staff passive damage during the loop.',tags:['dmg']},
    ],
    tips:['Kevin requires 3 Leeching Crystals — finding all 3 IS the run until it happens. Every other item is secondary.','Once Kevin + Mirror are both active at high attack speed, you become unkillable. Stand still.','Use Luck Tome specifically to find Leeching Crystals faster from chests and vendors.','This build took players to 22-hour AFK runs. It was patched but remains the strongest Megachad strategy.','Idle Juice doubles damage while standing still — already your default playstyle in the immortal phase.'],
    progression:[
      {label:'Levels 1–10',sublabel:'Farm Leeching Crystals',weapons:['Aura'],tomes:['XP Tome','Luck Tome'],tips:['Your only real goal this phase is finding Leeching Crystals. Open every chest, visit every vendor.','XP + Luck Tomes first — faster levels and better item quality means Crystals appear sooner.','Aura handles early enemies passively. Don\'t get distracted unless the item is a Crystal, Mirror, or Kevin.']},
      {label:'Levels 11–20',sublabel:'Build the safety net',weapons:['Aura','Aegis','Frostwalker'],tomes:['XP Tome','Luck Tome','Attack Speed Tome'],tips:['Add Aegis and Frostwalker — you need durability before Kevin starts dealing you damage.','Attack Speed Tome is critical — Kevin procs Mirror based on hits per second, not total damage.','Still no Kevin? Keep looking. This is still the priority above all else.']},
      {label:'Levels 21–35',sublabel:'Kevin+Mirror activation',weapons:['Aura','Aegis','Frostwalker','Lightning Staff'],tomes:['Attack Speed Tome','Luck Tome','Cursed Tome'],tips:['The moment you have Kevin AND Mirror, equip both. The immortal loop begins immediately.','Cursed Tome added — denser spawns mean Kevin procs faster means more Mirror windows.','Lightning Staff as fourth weapon — fires passively while you stand still in the loop.']},
      {label:'Levels 35+',sublabel:'Literally unkillable',weapons:['Aura','Aegis','Frostwalker','Lightning Staff','Revolver'],tomes:['Attack Speed Tome','Size Tome','Cursed Tome'],tips:['At full Attack Speed stacks + Kevin + Mirror, invulnerability windows fully overlap. You cannot die.','Size Tome expands Aura radius — more passive damage while standing still indefinitely.','You can AFK this run. Aura + Lightning + Revolver kill everything. Kevin+Mirror means nothing kills you.']},
    ],
  },
};

const tagMap={dmg:['tag-dmg','DMG'],util:['tag-util','UTIL'],def:['tag-def','DEF'],luck:['tag-luck','LUCK'],speed:['tag-speed','SPEED'],aoe:['tag-aoe','AoE']};
function tagHtml(tags){return tags.map(t=>tagMap[t]?`<span class="tag ${tagMap[t][0]}">${tagMap[t][1]}</span>`:'').join('');}
function tc(r){return {S:'rank-S',A:'rank-A',B:'rank-B',C:'rank-C'}[r]||'rank-C';}
function ri(items){return items.map(i=>`<div class="item-row"><span class="rank-badge ${tc(i.rank)}">${i.rank}</span><span class="item-emoji">${i.emoji}</span><div class="item-info"><div class="item-name">${i.name}</div><div class="item-desc">${i.desc}</div><div class="item-tags">${tagHtml(i.tags)}</div></div></div>`).join('');}

function renderProgSection(phases){
  if(!phases)return'';
  const phaseColors=['phase-1','phase-2','phase-3','phase-4'];
  return`<div class="prog-section section animate-in" style="animation-delay:.25s">
    <div class="section-title"><span>📈</span>How to Play — Level Progression</div>
    <div class="prog-phases">
      ${phases.map((p,i)=>`
        <div class="phase-block ${phaseColors[i]}" onclick="togglePhase(this)">
          <div class="phase-header">
            <span class="phase-label">${p.label}</span>
            <span class="phase-sublabel">${p.sublabel}</span>
            <span class="phase-chevron">▶</span>
          </div>
          <div class="phase-body">
            <div class="phase-row">
              <div class="phase-row-title">⚔️ Priority Weapons</div>
              <div class="phase-chips">${p.weapons.map(w=>`<span class="phase-chip chip-weapon">${w}</span>`).join('')}</div>
            </div>
            <div class="phase-row">
              <div class="phase-row-title">📚 Priority Tomes</div>
              <div class="phase-chips">${p.tomes.map(t=>`<span class="phase-chip chip-tome">${t}</span>`).join('')}</div>
            </div>
            <div class="phase-row">
              <div class="phase-row-title">🎮 Playstyle</div>
              ${p.tips.map(t=>`<div class="phase-tip">${t}</div>`).join('')}
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

function renderProgression(charId){return renderProgSection(PROG[charId]);}

function renderBuildContent(char,buildIdx){
  let weapons,tomes,items,tips,prog;
  if(buildIdx===0){
    weapons=char.weapons;tomes=char.tomes;items=char.items;tips=char.tips;
    prog=PROG[char.id];
  } else {
    const b=BUILDS2[char.id];
    weapons=b.weapons;tomes=b.tomes;items=b.items;tips=b.tips;
    prog=b.progression;
  }
  return`
    <div class="section animate-in" style="animation-delay:.05s"><div class="section-title"><span>⚔️</span>Top Weapons</div><div class="item-list">${ri(weapons)}</div></div>
    <div class="section animate-in" style="animation-delay:.1s"><div class="section-title"><span>📚</span>Top Tomes</div><div class="item-list">${ri(tomes)}</div></div>
    <div class="section animate-in" style="animation-delay:.15s"><div class="section-title"><span>🎒</span>Top Items</div><div class="item-list">${ri(items)}</div></div>
    <div class="section tips-box animate-in" style="animation-delay:.2s"><div class="tips-title">💡 Pro Tips</div><ul class="tips-list">${tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>
    ${renderProgSection(prog)}
  `;
}

function switchBuildTab(charId,idx,btn){
  document.querySelectorAll('.build-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const char=C.find(c=>c.id===charId);
  document.getElementById('build-tab-content').innerHTML=renderBuildContent(char,idx);
}

function togglePhase(block){
  block.classList.toggle('open');
}

function showBuild(charId){
  const char=C.find(c=>c.id===charId);
  if(!char)return;
  const isMulti=charId in BUILDS2;
  const b2=isMulti?BUILDS2[charId]:null;
  const tabsHtml=isMulti?`
    <div class="build-tab-label">BUILD STRATEGY</div>
    <div class="build-tabs animate-in">
      <button class="build-tab active" onclick="switchBuildTab('${charId}',0,this)">${b2.b1name}</button>
      <button class="build-tab" onclick="switchBuildTab('${charId}',1,this)">${b2.b2name}</button>
    </div>`:'';
  document.getElementById('build-content').innerHTML=`
    <div class="char-hero animate-in">
      <div class="char-hero-emoji">${char.emoji}</div>
      <div class="char-hero-info">
        <h2>${char.name}</h2>
        <span class="char-tier-badge tier-${char.tier}" style="position:relative;top:auto;right:auto;display:inline-block;margin-top:4px;">${char.tier}-Tier</span>
        <div class="char-hero-passive" style="margin-top:6px;">${char.passive}</div>
        <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;">
          <span class="starter-badge">⚔️ ${char.starter}</span>
          <span class="playstyle-tag">🎮 ${char.playstyle}</span>
        </div>
      </div>
    </div>
    ${tabsHtml}
    <div id="build-tab-content">${renderBuildContent(char,0)}</div>
    <div class="legend"><div class="legend-item"><span class="legend-rank rank-S">S</span> Must-have</div><div class="legend-item"><span class="legend-rank rank-A">A</span> Excellent</div><div class="legend-item"><span class="legend-rank rank-B">B</span> Strong</div><div class="legend-item"><span class="legend-rank rank-C">C</span> Situational</div></div>
  `;
  document.getElementById('char-select').style.display='none';
  document.getElementById('build-screen').style.display='block';
  window.scrollTo(0,0);
}
function goBack(){
  document.getElementById('char-select').style.display='block';
  document.getElementById('build-screen').style.display='none';
  window.scrollTo(0,0);
}
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
</body>
</html>
